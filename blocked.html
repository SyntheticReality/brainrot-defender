<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06030d" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png" />
    <link rel="apple-touch-icon" href="icons/icon128.png" />
    <title>Brainrot Defender Activated</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06030d;
        --bg-soft: #11081b;
        --lime: #a8ff3d;
        --cyan: #8dffeb;
        --white: #fcfbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(168, 255, 61, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(141, 255, 235, 0.12), transparent 32%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 52%, #04020a 100%);
        color: var(--white);
        font-family: "Segoe UI Variable", Aptos, sans-serif;
      }

      main {
        position: relative;
        width: min(960px, calc(100vw - 32px));
        min-height: min(72vh, 720px);
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .field {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .ring,
      .beam,
      .grid-line {
        position: absolute;
        inset: 50%;
        transform: translate(-50%, -50%);
      }

      .ring {
        border-radius: 999px;
        border: 1px solid rgba(168, 255, 61, 0.28);
        box-shadow:
          0 0 24px rgba(168, 255, 61, 0.14),
          inset 0 0 24px rgba(141, 255, 235, 0.06);
        animation: pulse 4.8s ease-in-out infinite;
      }

      .ring.one {
        width: 280px;
        height: 280px;
      }

      .ring.two {
        width: 430px;
        height: 430px;
        animation-delay: -1.2s;
      }

      .ring.three {
        width: 620px;
        height: 620px;
        animation-delay: -2.4s;
      }

      .beam {
        width: 180%;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, rgba(168, 255, 61, 0.8) 50%, transparent 100%);
        filter: blur(0.4px);
        animation: sweep 5.4s linear infinite;
        transform-origin: center;
      }

      .grid-line {
        width: 140%;
        height: 140%;
        border-radius: 50%;
        background:
          repeating-radial-gradient(
            circle,
            rgba(141, 255, 235, 0.04) 0 2px,
            transparent 2px 42px
          );
        opacity: 0.6;
        animation: rotate 18s linear infinite;
      }

      .copy {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 12px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 5.4rem);
        line-height: 0.9;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #ffffff;
        text-shadow:
          0 0 8px rgba(255, 255, 255, 0.78),
          0 0 18px rgba(168, 255, 61, 0.32),
          0 0 28px rgba(141, 255, 235, 0.12);
      }

      .glitch {
        position: relative;
        display: inline-block;
      }

      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .glitch::before {
        color: rgba(168, 255, 61, 0.24);
        transform: translate(1px, -1px);
      }

      .glitch::after {
        color: rgba(141, 255, 235, 0.18);
        transform: translate(-1px, 1px);
      }

      .status {
        margin: 0 auto;
        width: 180px;
        height: 12px;
        border-radius: 999px;
        background:
          linear-gradient(90deg, rgba(168, 255, 61, 0.16), rgba(168, 255, 61, 0.92), rgba(141, 255, 235, 0.18));
        box-shadow:
          0 0 18px rgba(168, 255, 61, 0.42),
          0 0 36px rgba(168, 255, 61, 0.18);
        animation: breathe 1.8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.38;
          transform: translate(-50%, -50%) scale(0.96);
        }

        50% {
          opacity: 0.88;
          transform: translate(-50%, -50%) scale(1.02);
        }
      }

      @keyframes sweep {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes rotate {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        100% {
          transform: translate(-50%, -50%) rotate(-360deg);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.72;
          transform: scaleX(0.94);
        }

        50% {
          opacity: 1;
          transform: scaleX(1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="field" aria-hidden="true">
        <div class="grid-line"></div>
        <div class="ring one"></div>
        <div class="ring two"></div>
        <div class="ring three"></div>
        <div class="beam"></div>
      </div>

      <section class="copy" aria-live="polite">
        <h1 class="glitch" data-text="BRAINROT DEFENDER ACTIVATED">BRAINROT DEFENDER ACTIVATED</h1>
        <div class="status"></div>
      </section>
    </main>

    <script type="module" src="blocked.js"></script>
  </body>
</html>
